on:
  push:
    branches:
      - master
  pull_request:

jobs:
  pytest-linux:
    strategy:
      matrix:
        python-version: ["3.7", "3.8", "3.9"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v1
      - run: $PYTHON -m pip install -r requirements.txt
      - run: $PYTHON -m pytest -vvvv
